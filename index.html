<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #ffd6e0, #d6f0ff);
  height: 100vh;
  color: #333;
}

#celebrationScreen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* ===== FLOATING BALLOONS (GLOBAL) ===== */
.balloons {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 5;
}
.balloon {
  position: absolute;
  width: 40px;
  height: 55px;
  border-radius: 50% 50% 45% 45%;
  background: radial-gradient(circle at 30% 30%, #fff, rgba(255,255,255,0.3));
}
.balloon::after {
  content: "";
  position: absolute;
  top: 55px;
  left: 50%;
  width: 2px;
  height: 40px;
  background: rgba(0,0,0,0.2);
  transform: translateX(-50%);
}
@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}

/* ===== HANGING FAIRY LIGHTS ===== */
.fairyLights {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 120px;
  pointer-events: none;
  z-index: 10;
}
.string {
  position: absolute; top: 0; width: 2px; height: 42px;
  background: rgba(0,0,0,0.2);
}
.bulb {
  position: absolute; top: 42px; left: 50%; transform: translateX(-50%);
  width: 10px; height: 10px; border-radius: 50%;
  background: #fff3a6; box-shadow: 0 0 12px #fff3a6, 0 0 24px #ffd36b;
  animation: glow 1.2s infinite alternate;
}
@keyframes glow {
  from { opacity: .4; transform: translateX(-50%) scale(.9);} 
  to { opacity: 1; transform: translateX(-50%) scale(1.2);} 
}

/* ===== CAKE ===== */
.cake { 
  position: relative; 
  width: 220px; 
  height: 180px; 
  cursor: pointer;
  z-index: 20;
}
.layer { position: absolute; left: 50%; transform: translateX(-50%); border-radius: 10px; }
.layer.bottom { bottom: 0; width: 220px; height: 70px; background: #ff9ecb; }
.layer.middle { bottom: 60px; width: 170px; height: 60px; background: #ff77b7; }
.layer.top { bottom: 110px; width: 120px; height: 50px; background: #ff5fa2; }
.icing { position: absolute; width: 220px; height: 20px; bottom: 70px; left: 50%; transform: translateX(-50%); background: #fff; border-radius: 10px; }
.candles { position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
.candle { width: 8px; height: 30px; background: #fff3a6; border-radius: 2px; position: relative; }
.flame { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 10px; height: 10px; background: orange; border-radius: 50%; animation: flicker .3s infinite alternate; }
@keyframes flicker { from { transform: translateX(-50%) scale(1);} to { transform: translateX(-50%) scale(.6);} }

/* ===== CUTE BUTTON ===== */
#clickButton {
  margin-top: 25px;
  padding: 12px 26px;
  border-radius: 999px;
  border: none;
  outline: none;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: #fff;
  background-image: linear-gradient(135deg,#ff9aec,#ff87b3);
  box-shadow: 0 8px 18px rgba(255,135,179,0.5);
  cursor: pointer;
  opacity: 0;
  transform: translateY(10px) scale(0.95);
  transition: opacity .6s ease, transform .6s ease, box-shadow .2s ease;
  display: none;
  z-index: 20;
}
#clickButton.show {
  display: inline-block;
  opacity: 1;
  transform: translateY(0) scale(1);
}
#clickButton:hover {
  box-shadow: 0 10px 24px rgba(255,135,179,0.7);
  transform: translateY(-2px) scale(1.03);
}
#clickButton:active {
  transform: translateY(1px) scale(0.98);
}

/* ===== BOOK ===== */
.book {
  width: 90vw;
  max-width: 420px;
  height: 600px;
  position: relative;
  perspective: 2500px;
  display: none;
  margin-top: 20px;
  overflow: visible;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  cursor: grab;
  touch-action: none;
  z-index: 15;
}
.book.hovered {
  transform: translateY(-6px);
  box-shadow: 0 14px 30px rgba(0,0,0,0.25);
}
.book.grabbing {
  cursor: grabbing;
}

/* binder */
.binder {
  position: absolute; left: 0; top: 0; width: 22px; height: 100%;
  background: linear-gradient(to right, #3e2a1f, #1a0f0a);
  border-radius: 6px; z-index: 1000; pointer-events: none;
}

/* pages */
.page {
  position: absolute; 
  inset: 0;
  width: 100%; 
  height: 100%;
  overflow: visible;
  background-size: 100% 100%; 
  background-position: center; 
  background-repeat: no-repeat;
  background-color: #f5f5f5;
  transform-origin: left center;
  transform-style: preserve-3d;
  transition: transform .9s cubic-bezier(.7,0,.3,1);
  border-radius: 12px;
  backface-visibility: hidden;
  box-shadow: 0 15px 35px rgba(0,0,0,.25);
}
.page.dragging {
  transition: none;
}
.page::after{
  content:""; position:absolute; right:0; top:0; width:28px; height:100%;
  background: linear-gradient(to left, rgba(0,0,0,.28), transparent);
  border-radius: 0 12px 12px 0;
}
.page:nth-of-type(1){ z-index: 5; }
.page:nth-of-type(2){ z-index: 4; }
.page:nth-of-type(3){ z-index: 3; }
.page:nth-of-type(4){ z-index: 2; }

.page.flipped { transform: rotateY(-150deg) translateX(4px); }

/* swipe hint */
#swipeHint {
  margin-top: 10px;
  font-size: 0.9rem;
  color: #555;
  animation: fadeInHint 0.6s ease 1s both;
}
@keyframes fadeInHint {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>
<body>

<div class="balloons" id="balloonsContainer"></div>

<div id="celebrationScreen">
  <div class="fairyLights" id="fairyLights"></div>

  <div class="cake" id="cake">
    <div class="layer bottom"></div>
    <div class="layer middle"></div>
    <div class="layer top"></div>
    <div class="icing"></div>
    <div class="candles">
      <div class="candle"><div class="flame"></div></div>
      <div class="candle"><div class="flame"></div></div>
      <div class="candle"><div class="flame"></div></div>
    </div>
  </div>

  <button id="clickButton">click me</button>

  <div class="book" id="book">
    <div class="binder"></div>
    <div class="page" style="background-image:url('page1.jpg')"></div>
    <div class="page" style="background-image:url('page2.jpg')"></div>
    <div class="page" style="background-image:url('page3.jpg')"></div>
    <div class="page" style="background-image:url('page4.jpg')"></div>
  </div>

  <div id="swipeHint" style="display:none;">swipe to read</div>
</div>

<script>
// ===== LIGHTS =====
function initLights(){
  const c = document.getElementById('fairyLights');
  c.innerHTML='';
  for(let i=0;i<12;i++){
    const s=document.createElement('div');
    s.className='string';
    s.style.left=(i*8+6)+'%';
    const b=document.createElement('div');
    b.className='bulb';
    s.appendChild(b);
    c.appendChild(s);
  }
}

initLights();

// ===== BALLOONS =====
function randomColor() {
  const colors = ['#ff9ecb','#ffdd7a','#a3f7bf','#9ad0ff','#c89bff'];
  return colors[Math.floor(Math.random()*colors.length)];
}

function createBalloon() {
  const container = document.getElementById('balloonsContainer');
  const balloon = document.createElement('div');
  balloon.className = 'balloon';
  balloon.style.left = Math.random()*100 + 'vw';
  balloon.style.backgroundColor = randomColor();
  const duration = 8 + Math.random()*7;
  balloon.style.animation = `floatUp ${duration}s linear infinite`;
  container.appendChild(balloon);
  setTimeout(()=> balloon.remove(), duration*1000 + 500);
}

setInterval(createBalloon, 900);
for(let i=0;i<10;i++) setTimeout(createBalloon, i*300);

// ===== BOOK SWIPE =====
let current = 0;
const pages = document.querySelectorAll('.page');
const book = document.getElementById('book');
let startX = null;
let isDragging = false;
const SWIPE_THRESHOLD = 50;

function next(){
  if(current < pages.length - 1){
    pages[current].classList.add('flipped');
    current++;
  }
}

function prev(){
  if(current > 0){
    current--;
    pages[current].classList.remove('flipped');
  }
}

function handleSwipe(diff) {
  if(diff < -SWIPE_THRESHOLD) {
    next();
  }
  else if(diff > SWIPE_THRESHOLD) {
    prev();
  }
}

function enableBook(){
  pages.forEach((p, i) => {
    p.style.zIndex = (pages.length - i).toString();
    p.classList.remove('flipped');
  });
  current = 0;

  book.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    isDragging = true;
    book.classList.add('grabbing');
    pages.forEach(p => p.classList.add('dragging'));
  }, false);

  book.addEventListener('touchend', (e) => {
    if(!isDragging || startX === null) return;
    const endX = e.changedTouches[0].clientX;
    const diff = endX - startX;
    handleSwipe(diff);
    book.classList.remove('grabbing');
    pages.forEach(p => p.classList.remove('dragging'));
    isDragging = false;
    startX = null;
  }, false);

  book.addEventListener('mousedown', (e) => {
    startX = e.clientX;
    isDragging = true;
    book.classList.add('grabbing');
    pages.forEach(p => p.classList.add('dragging'));
  });

  document.addEventListener('mouseup', (e) => {
    if(!isDragging || startX === null) return;
    const endX = e.clientX;
    const diff = endX - startX;
    handleSwipe(diff);
    book.classList.remove('grabbing');
    pages.forEach(p => p.classList.remove('dragging'));
    isDragging = false;
    startX = null;
  });

  book.addEventListener('mouseenter', () => {
    if(!isDragging) book.classList.add('hovered');
  });

  book.addEventListener('mouseleave', () => {
    book.classList.remove('hovered');
  });
}

// ===== STAGES =====
let stage = 0;
const cake = document.getElementById('cake');
const clickButton = document.getElementById('clickButton');

cake.addEventListener('click', () => {
  if(stage === 0){
    const flames = document.querySelectorAll('.flame');
    flames.forEach(f => f.style.display = 'none');
    stage = 1;
    setTimeout(() => {
      clickButton.classList.add('show');
    }, 300);
  }
});

clickButton.addEventListener('click', () => {
  if(stage === 1){
    cake.style.display = 'none';
    clickButton.style.display = 'none';
    book.style.display = 'block';
    document.getElementById('swipeHint').style.display = 'block';
    stage = 2;
    enableBook();
  }
});
</script>

</body>
</html>
